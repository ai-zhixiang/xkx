<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>享客虾 · 管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,'PingFang SC','Microsoft YaHei',sans-serif;background:#F5F3F0;color:#2C2C2C;min-height:100vh}
.sidebar{position:fixed;top:0;left:0;width:200px;height:100vh;background:linear-gradient(180deg,#D3543A,#A93226);color:#fff;z-index:10;display:flex;flex-direction:column}
.sidebar .logo{padding:20px 16px;font-size:20px;font-weight:700;border-bottom:1px solid rgba(255,255,255,.1)}
.sidebar .logo small{display:block;font-size:10px;font-weight:400;opacity:.6;margin-top:2px}
.sidebar nav{flex:1;padding:10px 0}
.sidebar nav a{display:flex;align-items:center;gap:8px;padding:12px 20px;color:rgba(255,255,255,.7);text-decoration:none;font-size:14px;transition:all .15s;cursor:pointer}
.sidebar nav a:hover{background:rgba(255,255,255,.08);color:#fff}
.sidebar nav a.active{background:rgba(255,255,255,.12);color:#fff;font-weight:600;border-right:3px solid #F39C12}
.main{margin-left:200px;min-height:100vh}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:#fff;border-bottom:1px solid rgba(178,155,125,.12)}
.top-bar h1{font-size:17px;font-weight:600}
.top-bar .badge{font-size:10px;padding:3px 10px;border-radius:10px;background:rgba(211,84,58,.08);color:#D3543A}
.content{padding:20px 24px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:10px;padding:14px;border:1px solid rgba(178,155,125,.08)}
.stat-card .num{font-size:22px;font-weight:700;color:#D3543A}
.stat-card .label{font-size:11px;color:#888;margin-top:2px}
.stat-card.warn .num{color:#E67E22}
.stat-card.good .num{color:#27AE60}
.section{background:#fff;border-radius:10px;border:1px solid rgba(178,155,125,.08);margin-bottom:16px}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid rgba(178,155,125,.08)}
.section-header h2{font-size:14px;font-weight:600}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 12px;color:#888;font-weight:500;border-bottom:1px solid rgba(178,155,125,.06)}
td{padding:8px 12px;border-bottom:1px solid rgba(178,155,125,.04)}
tr:hover td{background:rgba(211,84,58,.02)}
.badge-status{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:500}
.s-active{background:rgba(39,174,96,.08);color:#27AE60}
.s-trial{background:rgba(52,152,219,.08);color:#2980B9}
.s-expired{background:rgba(231,76,60,.08);color:#C0392B}
.btn{padding:5px 12px;border-radius:7px;font-size:11px;font-weight:500;border:none;cursor:pointer;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,#D3543A,#C0392B);color:#fff}
.btn-sm{padding:3px 8px;font-size:10px}
.btn-warn{border:1px solid rgba(231,76,60,.3);color:#C0392B;background:transparent}
.empty{padding:30px;text-align:center;color:#aaa;font-size:13px}
.tab-nav{display:flex;gap:4px;margin-bottom:12px}
.tab-nav span{padding:5px 12px;border-radius:7px;font-size:11px;cursor:pointer;color:#888}
.tab-nav span.active{background:rgba(211,84,58,.08);color:#D3543A;font-weight:500}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:999;background:#2C2C2C;color:#fff;padding:10px 24px;border-radius:10px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
input{border:1px solid #ddd;border-radius:7px;padding:6px 10px;font-size:12px;outline:none;font-family:inherit}
input:focus{border-color:#D3543A}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">🦞 享客虾<small>个人AI秘书平台</small></div>
  <nav>
    <a class="active" onclick="switchTab('dashboard')">📊 总览</a>
    <a onclick="switchTab('subscribers')">👤 用户管理</a>
    <a onclick="switchTab('orders')">📋 订单</a>
    <a onclick="switchTab('plans')">📦 套餐</a>
  </nav>
  <div style="padding:14px 16px;font-size:10px;opacity:.4;border-top:1px solid rgba(255,255,255,.08)">v0.1 · 个人版</div>
</div>

<div class="main">
  <div class="top-bar">
    <h1 id="pageTitle">📊 总览</h1>
    <span class="badge" id="statusBadge">加载中</span>
  </div>
  <div class="content" id="tabContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const TOKEN = btoa('admin:admin888');

async function api(path, opts={}){
  const res = await fetch('/api/admin'+path, {
    headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'},...opts
  });
  if(res.status===401){showToast('登录过期');return null}
  return res.json();
}

function $(id){return document.getElementById(id)}

async function switchTab(tab){
  document.querySelectorAll('.sidebar nav a').forEach(a=>a.classList.remove('active'));
  document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
    const tabs = {'dashboard':'📊 总览','subscribers':'👤 用户','orders':'📋 订单','plans':'📦 套餐'};
    $('pageTitle').textContent = tabs[tab]||tab;

  if(tab==='dashboard') await loadDashboard();
  if(tab==='subscribers') await loadSubscribers();
  if(tab==='orders') await loadOrders();
  if(tab==='plans') await loadPlans();
}

async function loadDashboard(){
  const stats = await api('/stats');
  if(!stats) return;
    $('tabContent').innerHTML = `
    <div class="stats">
      <div class="stat-card"><div class="num">${stats.total_subscribers}</div><div class="label">总用户</div></div>
      <div class="stat-card good"><div class="num">${stats.active}</div><div class="label">付费活跃</div></div>
      <div class="stat-card warn"><div class="num">${stats.expiring_soon}</div><div class="label">7天内到期</div></div>
      <div class="stat-card"><div class="num">${stats.expired}</div><div class="label">已到期</div></div>
      <div class="stat-card"><div class="num">${(stats.total_messages||0).toLocaleString()}</div><div class="label">总消息数</div></div>
    </div>
    <div class="section"><div class="section-header"><h2>快速操作</h2></div>
      <div style="padding:16px">
        <a href="/" style="color:#D3543A;font-size:13px">→ 查看产品页</a>
      </div>
    </div>`;
  $('statusBadge').textContent = '运行中';
}

async function loadSubscribers(filter=''){
  let url = '/subscribers';
  if(filter) url += '?status='+filter;
  const subs = await api(url);
  if(!subs) return;
  $('tabContent').innerHTML = `
    <div class="section">
      <div class="section-header"><h2>订阅用户</h2>
        <div class="tab-nav">
          <span class="${!filter?'active':''}" onclick="loadSubscribers('')">全部</span>
          <span class="${filter=='active'?'active':''}" onclick="loadSubscribers('active')">付费</span>
          <span class="${filter=='expired'?'active':''}" onclick="loadSubscribers('expired')">到期</span>
        </div>
      </div>
      ${subs.length===0?'<div class="empty">暂无用户</div>':`
      <table><tr><th>用户</th><th>套餐</th><th>用量</th><th>状态</th><th>到期</th><th>操作</th></tr>
      ${subs.map(s=>`
        <tr>
          <td>${s.nickname}<br><small style="color:#aaa">${s.openid}</small></td>
          <td>${s.plan_name}</td>
          <td>${s.messages_used}/${s.messages_limit||'∞'}<br><small style="color:#aaa">总计${s.total_messages}条</small></td>
          <td><span class="badge-status s-${s.status}">${s.status==='active'?'付费':'到期'}</span></td>
          <td>${s.days_left>0?s.days_left+'天':'<span style=color:#c33>已到期</span>'}</td>
          <td>
            ${s.status==='expired'?`<button class="btn btn-primary btn-sm" onclick="activateSub(${s.id})">激活</button>`:''}
            ${s.status!=='expired'?`<button class="btn btn-warn btn-sm" onclick="expireSub(${s.id})">到期</button>`:''}
            <button class="btn btn-sm" style="background:#27AE60;color:#fff" onclick="renewSub(${s.id})">续费</button>
          </td>
        </tr>`).join('')}
      </table>`}
    </div>`;
}

async function loadOrders(){
  const orders = await api('/orders');
  if(!orders) return;
  $('tabContent').innerHTML = `
    <div class="section"><div class="section-header"><h2>最近订单</h2></div>
    ${orders.length===0?'<div class="empty">暂无订单</div>':`
    <table><tr><th>ID</th><th>用户ID</th><th>套餐</th><th>金额</th><th>状态</th><th>时间</th></tr>
    ${orders.map(o=>`
      <tr><td>#${o.id}</td><td>${o.subscriber_id}</td><td>${o.plan_name}</td>
      <td>¥${o.amount_yuan}</td><td>${o.status}</td><td>${o.created_at}</td></tr>`).join('')}
    </table>`}
    </div>`;
}

async function loadPlans(){
  const plans = await api('/plans');
  if(!plans) return;
  $('tabContent').innerHTML = `
    <div class="section"><div class="section-header"><h2>套餐配置</h2></div>
    <table><tr><th>ID</th><th>名称</th><th>月费</th><th>消息配额</th><th>状态</th><th>操作</th></tr>
    ${plans.map(p=>`
      <tr><td>${p.id}</td><td>${p.name}</td><td>¥${p.price_yuan}</td>
      <td>${p.monthly_messages||'不限量'}</td>
      <td>${p.is_active?'✅':'❌'}</td>
      <td><button class="btn btn-sm ${p.is_active?'btn-warn':'btn-primary'}" onclick="togglePlan(${p.id})">${p.is_active?'停用':'启用'}</button></td></tr>`).join('')}
    </table></div>`;
}

async function expireSub(id){if(confirm('确认标记为到期？')){await api('/subscribers/'+id+'/expire',{method:'POST'});loadSubscribers()}}
async function activateSub(id){await api('/subscribers/'+id+'/activate',{method:'POST'});loadSubscribers()}
async function renewSub(id){const m=prompt('续费月数','1');if(m){await api('/subscribers/'+id+'/renew',{method:'POST',body:JSON.stringify({months:parseInt(m)})});loadSubscribers()}}
async function togglePlan(id){await api('/plans/'+id+'/toggle',{method:'POST'});loadPlans()}

function showToast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

// 初始加载
loadDashboard();
</script>
</body>
</html>

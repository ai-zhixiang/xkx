<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微侠 Bot 测试台</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'PingFang SC', sans-serif; background: #f5f5f5; padding: 20px; }
h1 { font-size: 20px; margin-bottom: 16px; color: #333; }
.section { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.section h2 { font-size: 15px; color: #666; margin-bottom: 12px; }

/* Bot list */
.bot-grid { display: flex; flex-direction: column; gap: 8px; }
.bot-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: #f8f9fa; border-radius: 8px; cursor: pointer; transition: all .2s; border: 2px solid transparent; }
.bot-row:hover { background: #eef1f5; }
.bot-row.active { border-color: #07c160; background: #e8f8ee; }
.bot-id { font-size: 13px; color: #333; font-family: 'SF Mono', monospace; }
.bot-status { font-size: 12px; padding: 2px 8px; border-radius: 10px; }
.status-ok { background: #e8f8ee; color: #07c160; }
.status-paused { background: #fff7e6; color: #fa8c16; }
.status-dead { background: #fff1f0; color: #f5222d; }

/* Chat area */
.chat-box { display: flex; gap: 8px; margin-top: 12px; }
.chat-box input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
.chat-box input:focus { border-color: #07c160; }
.chat-box button { padding: 10px 20px; background: #07c160; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
.chat-box button:disabled { opacity: .5; cursor: not-allowed; }

/* Message log */
.msg-log { margin-top: 12px; max-height: 300px; overflow-y: auto; }
.msg { padding: 10px 12px; margin-bottom: 8px; border-radius: 8px; font-size: 13px; line-height: 1.5; }
.msg-out { background: #e8f8ee; margin-left: 30px; }
.msg-in { background: #f0f0f0; margin-right: 30px; }
.msg-time { font-size: 11px; color: #999; margin-bottom: 4px; }
.msg-label { font-weight: 600; font-size: 12px; margin-bottom: 2px; }

/* Refresh button */
.refresh-btn { float: right; padding: 4px 12px; background: none; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; cursor: pointer; color: #666; }
.refresh-btn:hover { background: #f0f0f0; }

/* QR code section */
.qr-area { margin-top: 16px; text-align: center; }
.qr-area img { max-width: 200px; border-radius: 8px; }
.qr-area .qr-link { display: block; margin-top: 8px; font-size: 12px; color: #07c160; word-break: break-all; }
</style>
</head>
<body>

<h1>🔧 微侠 Bot 测试台</h1>

<div class="section">
  <h2>📡 Bot 状态 <button class="refresh-btn" onclick="loadStatus()">刷新</button></h2>
  <div class="bot-grid" id="botList">
    <div style="color:#999;font-size:13px;text-align:center;padding:20px">加载中...</div>
  </div>
</div>

<div class="section">
  <h2>💬 测试对话</h2>
  <div style="font-size:12px;color:#999;margin-bottom:8px">
    当前 Bot: <span id="currentBot" style="font-family:monospace;color:#333">未选择</span>
    <span id="botHint" style="color:#fa8c16;display:none"> ⚠️ 该 Bot 暂停中，回复可能不可用</span>
  </div>
  <div class="chat-box">
    <input id="msgInput" placeholder="输入测试消息..." onkeydown="if(event.key==='Enter') sendTest()">
    <button id="sendBtn" onclick="sendTest()">发送</button>
  </div>
  <div class="msg-log" id="msgLog"></div>
</div>

<div class="section">
  <h2>📱 重新扫码激活</h2>
  <p style="font-size:13px;color:#666;margin-bottom:12px">如果 Bot token 失效，扫码重新激活</p>
  <div class="qr-area" id="qrArea">
    <button onclick="generateQR()" style="padding:10px 20px;background:#07c160;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer">生成新二维码</button>
    <div id="qrResult" style="margin-top:12px;display:none">
      <img id="qrImg" src="">
      <a class="qr-link" id="qrLink" href="#" target="_blank">打开链接</a>
      <p style="font-size:12px;color:#999;margin-top:8px">用微信扫码激活新 Bot</p>
    </div>
  </div>
</div>

<script>
let selectedBot = null;
let botData = [];

async function loadStatus() {
  const el = document.getElementById('botList');
  el.innerHTML = '<div style="color:#999;font-size:13px;text-align:center;padding:20px">加载中...</div>';
  
  try {
    const [statusResp, pauseResp] = await Promise.all([
      fetch('/api/bot/connector/status').then(r => r.json()),
      fetch('/api/bot/paused').then(r => r.json()).catch(() => ({paused:[]}))
    ]);
    
    const pausedList = pauseResp.paused || [];
    
    botData = (statusResp.bots || []).map(b => {
      const isRunning = b.running;
      const isPaused = pausedList.includes(b.bot_id);
      let status = 'dead';
      let label = '❌ 已失效';
      let cls = 'status-dead';
      if (isRunning && !isPaused) {
        status = 'ok';
        label = '✅ 运行中';
        cls = 'status-ok';
      } else if (isPaused) {
        status = 'paused';
        label = '⏳ 冷却中';
        cls = 'status-paused';
      } else if (!b.is_active) {
        label = '⚪ 未激活';
        cls = 'status-dead';
      }
      return { id: b.bot_id, nick: b.nickname || '', status, label, cls };
    });
    
    renderBots();
  } catch(e) {
    el.innerHTML = `<div style="color:#f5222d;font-size:13px;text-align:center;padding:20px">❌ 加载失败: ${e.message}</div>`;
  }
}

function renderBots() {
  const el = document.getElementById('botList');
  el.innerHTML = botData.map(b => `
    <div class="bot-row ${selectedBot === b.id ? 'active' : ''}" onclick="selectBot('${b.id}')">
      <span class="bot-id">${b.id}</span>
      <span class="bot-status ${b.cls}">${b.label}</span>
    </div>
  `).join('');
  
  if (!selectedBot && botData.length > 0) {
    // Auto-select first alive bot
    const alive = botData.find(b => b.status === 'ok');
    selectBot(alive ? alive.id : botData[0].id);
  }
}

function selectBot(id) {
  selectedBot = id;
  const bot = botData.find(b => b.id === id);
  document.getElementById('currentBot').textContent = id;
  const hint = document.getElementById('botHint');
  hint.style.display = bot && bot.status !== 'ok' ? 'inline' : 'none';
  renderBots();
}

async function sendTest() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !selectedBot) return;
  
  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  
  addLog(text, 'out');
  input.value = '';
  
  try {
    const resp = await fetch('/api/bot/webhook', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        bot_id: selectedBot,
        user_id: 'test:' + Date.now(),
        content: text,
        msg_id: 'test-' + Date.now()
      })
    });
    const data = await resp.json();
    if (data.success && data.response) {
      addLog(data.response, 'in');
    } else {
      addLog('❌ ' + (data.error || JSON.stringify(data)), 'in');
    }
  } catch(e) {
    addLog('❌ 请求失败: ' + e.message, 'in');
  }
  
  btn.disabled = false;
}

function addLog(text, dir) {
  const log = document.getElementById('msgLog');
  const div = document.createElement('div');
  div.className = `msg msg-${dir}`;
  const ts = new Date().toLocaleTimeString();
  const label = dir === 'out' ? '📤 发送' : '📥 回复';
  div.innerHTML = `<div class="msg-time">${ts}</div><div class="msg-label">${label}</div>${text.replace(/\n/g, '<br>')}`;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

async function generateQR() {
  const btn = document.querySelector('.qr-area button');
  btn.disabled = true;
  btn.textContent = '生成中...';
  const result = document.getElementById('qrResult');
  
  try {
    const resp = await fetch('/api/bot/qrcode');
    const data = await resp.json();
    if (data.success) {
      document.getElementById('qrImg').src = data.qrcode_img || '/api/bot/qrcode/image?value=' + data.qrcode_value;
      document.getElementById('qrLink').href = data.qrcode_url || '#';
      document.getElementById('qrLink').textContent = data.qrcode_url || '';
      result.style.display = 'block';
      btn.textContent = '🔄 重新生成';
    } else {
      alert('生成失败: ' + JSON.stringify(data));
      btn.textContent = '生成二维码';
    }
  } catch(e) {
    alert('请求失败: ' + e.message);
    btn.textContent = '生成二维码';
  }
  btn.disabled = false;
}

// Auto-load
loadStatus();
</script>
</body>
</html>
